---
test_name: Fluxo de Tarefas - Busca e Validação por Usuário

stages:
  # ─────────────────────────────────────────────────────────────
  # Stage 1 — Busca a tarefa específica pelo ID e captura userId
  # ─────────────────────────────────────────────────────────────
  - name: "Stage 1: Buscar tarefa e capturar userId"
    request:
      url: "https://jsonplaceholder.typicode.com/todos/1"
      method: GET
    response:
      status_code: 200
      save:
        json:
          id_do_usuario: userId     # salva o userId para usar no próximo stage

  # ─────────────────────────────────────────────────────────────
  # Stage 2 — Lista todas as tarefas do usuário capturado
  # ─────────────────────────────────────────────────────────────
  - name: "Stage 2: Buscar todas as tarefas do usuario"
    request:
      url: "https://jsonplaceholder.typicode.com/todos"
      method: GET
      params:
        userId: "{id_do_usuario}"   # variável salva no Stage 1
    response:
      status_code: 200  # integração Python
